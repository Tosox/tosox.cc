  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07091a;
      --bg1:       #0c1024;
      --bg2:       #111830;
      --bg3:       #182040;
      --border:    #1e2d50;
      --border2:   #273760;
      --tx:        #e2e8f5;
      --tx2:       #8fa3c8;
      --tx3:       #4f6490;
      --accent:    oklch(62% 0.20 222);
      --accent2:   oklch(62% 0.20 168);
      --accent3:   oklch(62% 0.20 290);
      --accentGlow: oklch(62% 0.20 222 / 0.18);
      --radius:    10px;
      --font:      'Space Grotesk', sans-serif;
      --mono:      'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    #root { min-height: 100vh; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }
    @keyframes shimmer {
      from { background-position: -200% center; }
      to   { background-position: 200% center; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .fadeUp { animation: fadeUp 0.5s ease both; }

    .gradient-text {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: oklch(from var(--bg) l c h / 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 60px;
    }
    .nav-logo {
      font-weight: 700; font-size: 18px; letter-spacing: -0.5px;
      color: var(--tx); text-decoration: none; display: flex; align-items: center; gap: 8px;
    }
    .nav-logo span { color: var(--accent); }
    .nav-tabs { display: flex; gap: 2px; }
    .nav-tab {
      padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
      color: var(--tx3); background: transparent; border: none; cursor: pointer;
      transition: color 0.2s, background 0.2s; font-family: var(--font);
    }
    .nav-tab:hover { color: var(--tx2); background: var(--bg2); }
    .nav-tab.active { color: var(--accent); background: var(--accentGlow); }

    /* Layout */
    .content { padding-top: 60px; max-width: 1100px; margin: 0 auto; padding-left: 32px; padding-right: 32px; }

    /* Hero */
    .hero {
      padding: 80px 0 60px;
      display: flex; gap: 48px; align-items: center;
    }
    .hero-avatar {
      width: 100px; height: 100px; border-radius: 50%;
      border: 2px solid var(--border2);
      box-shadow: 0 0 32px var(--accentGlow);
      flex-shrink: 0;
    }
    .hero-text { flex: 1; }
    .hero-name { font-size: 42px; font-weight: 700; letter-spacing: -1.5px; line-height: 1; margin-bottom: 10px; }
    .hero-bio { font-size: 16px; color: var(--tx2); max-width: 560px; text-wrap: pretty; margin-bottom: 20px; }
    .hero-meta { display: flex; gap: 16px; flex-wrap: wrap; }
    .hero-chip {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--tx3); font-family: var(--mono);
    }
    .hero-chip svg { width: 13px; height: 13px; opacity: 0.7; }
    .hero-actions { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
      text-decoration: none; border: none; cursor: pointer; font-family: var(--font);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent); color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .btn-ghost {
      background: var(--bg2); color: var(--tx2); border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--border2); color: var(--tx); background: var(--bg3); }

    /* Section */
    .section { padding: 56px 0; }
    .section-header { margin-bottom: 32px; }
    .section-label {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
    }
    .section-label::before {
      content: ''; display: inline-block; width: 20px; height: 1px; background: var(--accent);
    }
    .section-title { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; }
    .section-desc { color: var(--tx2); font-size: 15px; margin-top: 6px; }

    /* Cards grid */
    .cards-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px;
    }

    .mod-card {
      background: var(--bg1); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px; display: flex; flex-direction: column;
      gap: 12px; transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      text-decoration: none; color: inherit;
      animation: fadeUp 0.4s ease both;
    }
    .mod-card:hover {
      border-color: var(--border2);
      box-shadow: 0 4px 24px oklch(from var(--accent) l c h / 0.1);
      transform: translateY(-2px);
    }
    .mod-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .mod-card-icon {
      width: 38px; height: 38px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .mod-card-links { display: flex; gap: 8px; }
    .mod-card-link {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; font-family: var(--mono); color: var(--tx3);
      text-decoration: none; background: var(--bg2); padding: 4px 8px;
      border-radius: 5px; border: 1px solid var(--border); transition: color 0.2s, border-color 0.2s;
    }
    .mod-card-link:hover { color: var(--accent); border-color: var(--accent); }
    .mod-card-name { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
    .mod-card-desc { font-size: 13px; color: var(--tx2); line-height: 1.5; text-wrap: pretty; flex: 1; }
    .mod-card-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .tag {
      font-size: 11px; font-family: var(--mono); padding: 3px 8px;
      border-radius: 4px; border: 1px solid var(--border); color: var(--tx3);
    }
    .tag-accent { border-color: oklch(from var(--accent) l c h / 0.4); color: var(--accent); background: var(--accentGlow); }
    .stars { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--tx3); font-family: var(--mono); margin-left: auto; }

    /* Contributions */
    .contrib-list { display: flex; flex-direction: column; gap: 10px; }
    .contrib-item {
      display: flex; align-items: center; gap: 16px;
      background: var(--bg1); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 18px; text-decoration: none; color: inherit;
      transition: border-color 0.2s, background 0.2s; animation: fadeUp 0.4s ease both;
    }
    .contrib-item:hover { border-color: var(--border2); background: var(--bg2); }
    .contrib-state {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .state-merged { background: oklch(62% 0.20 290); box-shadow: 0 0 6px oklch(62% 0.20 290 / 0.5); }
    .state-open { background: oklch(62% 0.20 168); box-shadow: 0 0 6px oklch(62% 0.20 168 / 0.5); }
    .state-closed { background: oklch(55% 0.15 15); box-shadow: 0 0 6px oklch(55% 0.15 15 / 0.5); }
    .contrib-main { flex: 1; min-width: 0; }
    .contrib-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contrib-sub { font-size: 12px; color: var(--tx3); font-family: var(--mono); margin-top: 2px; }
    .contrib-meta { font-size: 11px; color: var(--tx3); font-family: var(--mono); text-align: right; flex-shrink: 0; }

    /* Skills */
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .skill-group {
      background: var(--bg1); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px; animation: fadeUp 0.4s ease both;
    }
    .skill-group-name { font-size: 12px; font-weight: 600; color: var(--tx3); letter-spacing: 1px; text-transform: uppercase; font-family: var(--mono); margin-bottom: 12px; }
    .skill-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .skill-pill {
      font-size: 12px; font-family: var(--mono); padding: 4px 10px;
      border-radius: 5px; background: var(--bg2); border: 1px solid var(--border); color: var(--tx2);
    }

    /* About */
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .about-card {
      background: var(--bg1); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 22px; animation: fadeUp 0.4s ease both;
    }
    .about-card h3 { font-size: 14px; font-weight: 600; color: var(--tx2); margin-bottom: 12px; }
    .about-card p { font-size: 14px; color: var(--tx2); line-height: 1.65; text-wrap: pretty; }

    /* Loading / empty */
    .loader { display: flex; align-items: center; justify-content: center; padding: 60px 0; }
    .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .empty { color: var(--tx3); font-size: 14px; padding: 40px 0; text-align: center; font-family: var(--mono); }

    /* Category tabs */
    .cat-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .cat-tab {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--border); color: var(--tx3); background: transparent;
      cursor: pointer; font-family: var(--font); transition: all 0.2s;
    }
    .cat-tab:hover { color: var(--tx2); border-color: var(--border2); }
    .cat-tab.active { background: var(--accentGlow); border-color: oklch(from var(--accent) l c h / 0.5); color: var(--accent); }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 0; }

    /* Stat badges in hero */
    .stat-badge {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 12px;
      font-size: 12px; color: var(--tx2); font-family: var(--mono);
    }
    .stat-num { color: var(--tx); font-weight: 600; }

    @media (max-width: 700px) {
      nav { padding: 0 16px; }
      .nav-tabs { display: none; }
      .content { padding-left: 16px; padding-right: 16px; }
      .hero { flex-direction: column; gap: 20px; padding: 40px 0 32px; }
      .hero-name { font-size: 32px; }
      .about-grid { grid-template-columns: 1fr; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

/* ─── Static repo card (same layout as ModCard) ─── */
function StaticRepoCard({ repo, catLabel, style = {} }) {
  return (
    <a href={repo.url} target="_blank" rel="noopener noreferrer" className="mod-card" style={style}>
      <div className="mod-card-top">
        <div className="mod-card-name" style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
          <IconGitHub />
          {repo.name}
        </div>
        <span className="stars">
          <IconStar /> {repo.stars}
          <span style={{ marginLeft: 6 }}><IconFork /> {repo.forks}</span>
        </span>
      </div>
      <div className="mod-card-desc">{repo.desc}</div>
      <div className="mod-card-footer">
        {repo.tags.map(t => <span key={t} className="tag">{t}</span>)}
        {catLabel && <span className="tag tag-accent" style={{ marginLeft: "auto" }}>{catLabel}</span>}
      </div>
    </a>
  );
}

/* ─── Mod card ─── */
function ModCard({ mod, category = "stalker", delay = 0 }) {
  const labelMap = { stalker: "S.T.A.L.K.E.R.", spt: "SPT", userscript: "Userscript" };
  return (
    <a
      href={`https://github.com/Tosox/${mod.repo}`}
      target="_blank"
      rel="noopener noreferrer"
      className="mod-card"
      style={{ animationDelay: `${delay}ms` }}
    >
      <div className="mod-card-top">
        <div className="mod-card-name" style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
          <IconGitHub />
          {mod.name}
        </div>
        <span className="stars">
          <IconStar /> {mod.stars ?? 0}
          <span style={{ marginLeft: 6 }}><IconFork /> {mod.forks ?? 0}</span>
        </span>
      </div>
      <div className="mod-card-desc">{mod.desc}</div>
      <div className="mod-card-footer">
        {mod.tags.map(t => <span key={t} className="tag">{t}</span>)}
        <span className="tag tag-accent" style={{ marginLeft: "auto" }}>{labelMap[category]}</span>
      </div>
    </a>
  );
}

/* ─── Contributions ─── */
function ContributionsSection({ prs, loading }) {
  if (loading) return <div className="loader"><div className="spinner"></div></div>;
  if (!prs.length) return <div className="empty">No contributions found or rate-limited. <a href="https://github.com/pulls?q=is%3Apr+author%3ATosox+-user%3ATosox" target="_blank" style={{color:"var(--accent)"}}>View on GitHub →</a></div>;

  return (
    <div className="contrib-list">
      {prs.map((pr, i) => {
        const state = pr.pull_request?.merged_at ? "merged" : pr.state;
        const repo = pr.repository_url?.split("/").slice(-2).join("/") || "";
        const date = new Date(pr.updated_at).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
        return (
          <a
            key={pr.id}
            href={pr.html_url}
            target="_blank"
            rel="noopener noreferrer"
            className="contrib-item"
            style={{ animationDelay: `${i * 40}ms` }}
          >
            <div className={`contrib-state state-${state}`}></div>
            <div className="contrib-main">
              <div className="contrib-title">{pr.title}</div>
              <div className="contrib-sub">{repo} #{pr.number}</div>
            </div>
            <div className="contrib-meta">
              <div style={{ color: state === "merged" ? "oklch(62% 0.20 290)" : state === "open" ? "oklch(62% 0.20 168)" : "oklch(55% 0.15 15)" }}>
                {state}
              </div>
              <div style={{ marginTop: 2 }}>{date}</div>
            </div>
          </a>
        );
      })}
    </div>
  );
}

            </div>

                { icon: <IconYouTube />, label: "YouTube", href: "https://www.youtube.com/@tosox" },
                { icon: <IconModDB />, label: "ModDB", href: "https://www.moddb.com/members/tosox" },
                { icon: <IconForge />, label: "SPT Forge", href: "https://forge.sp-tarkov.com/user/79394/tosox" },
                { icon: <IconKofi />, label: "Ko-fi", href: "https://ko-fi.com/tosox" },
                { icon: <IconEmail />, label: "Contact", href: "mailto:tosoxdev@gmail.com" },

        <div className="divider"></div>

        {/* Tab content */}
        {tab === "about" && (

              <div className="section-label">About</div>

            </div>

              <div style={{ gridColumn: "1 / -1", background: "var(--bg1)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: "28px 32px" }}>
                <p style={{ fontSize: 16, color: "var(--tx2)", lineHeight: 1.75, textWrap: "pretty", maxWidth: 700 }}>

              <div style={{ background: "var(--bg1)", border: "1px solid var(--border)", borderRadius: "var(--radius)", padding: "24px 28px" }}>

                  className="btn btn-ghost"

}
