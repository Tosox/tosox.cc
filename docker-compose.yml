# Pulls prebuilt images from GHCR. Building on the Pi took long enough that Portainer timed out
# mid-deploy; CI builds them on a native arm64 runner instead and this just pulls.
#
# To build locally instead of pulling:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
services:
  api:
    image: ghcr.io/tosox/tosox.cc-api:${TAG:-latest}
    container_name: tosox-api
    environment:
      # Optional; blank works (60 req/hr). Set in .env to raise the GitHub rate limit.
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    expose:
      - "8080"
    restart: unless-stopped

  web:
    image: ghcr.io/tosox/tosox.cc-web:${TAG:-latest}
    container_name: tosox-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
