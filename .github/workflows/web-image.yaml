# Rebuilds the web image only when something that goes into it changes. Editing the README or
# anything under api/ does not trigger a build.
name: web image

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - '.github/workflows/web-image.yaml'
      - '.github/workflows/docker-image.yaml'
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/docker-image.yaml
    permissions:
      contents: read
      packages: write
    with:
      context: ./web
      suffix: web
