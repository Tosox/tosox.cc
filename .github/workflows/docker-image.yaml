# Shared build/push logic for both images. The api/ and web/ workflows call this with their own
# context, so the build steps only exist in one place and cannot drift apart.
name: Build and push image

on:
  workflow_call:
    inputs:
      context:
        description: Build context directory (holds the Dockerfile).
        required: true
        type: string
      suffix:
        description: Appended to the repo name to form the image name.
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build:
    # Native arm64, not QEMU. The Pi is the only deploy target, and emulating arm64 on an amd64
    # runner turns the Gradle and Angular builds into a 30+ minute job.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        # GHCR rejects uppercase; the owner is "Tosox".
        run: echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY@L}-${{ inputs.suffix }}" >> $GITHUB_ENV

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Includes org.opencontainers.image.source, which links the package to this repo.
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          # Without this every build re-downloads the Gradle distribution and re-runs npm ci.
          cache-from: type=gha
          cache-to: type=gha,mode=max
